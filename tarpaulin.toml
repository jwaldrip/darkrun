# darkrun WORKSPACE line-coverage config (cargo-tarpaulin).
#
# Run:  cargo tarpaulin --config workspace
#
# Scope: the ENTIRE workspace — engine, CLI, contract, content, HTTP, the shared
# UI component crate, the desktop app, and the website (web/site + web/server).
# The /goal target is 100% across all of it.
#
# Excluded files are EXERCISED ONLY BY RUNNING A BINARY or perform irreducible
# runtime I/O that cannot run in a unit-test process — composition/launch glue,
# like a conventional `main.rs`:
#   - **/src/main.rs and **/bin/*.rs : binary entry points
#   - mcp/server.rs   : the blocking MCP stdio host + axum socket bind/serve loop
#   - mcp/desktop.rs  : spawns the external desktop GUI app (LaunchServices `open`)
#   - desktop/src/main.rs : the Dioxus/Wry webview launch (needs a windowing system)
# Dioxus `rsx!` components ARE covered — via dioxus_ssr render tests that execute
# the component function — not excluded.

[workspace]
workspace = true
engine = "llvm"
timeout = "1200s"
exclude-files = [
    "target/*",
    "crates/darkrun-mcp/src/server.rs",
    "crates/darkrun-mcp/src/desktop.rs",
    "**/src/main.rs",
    "**/src/bin/*.rs",
    "desktop/src/main.rs",
]
# fail-under is enabled once the workspace reaches 100% (the /goal target).
# fail-under = 100
