# darkrun WORKSPACE line-coverage config (cargo-tarpaulin).
#
# Run:  ./scripts/coverage.sh        (writes /tmp/cov/lcov.info + prints the %)
#
# ── What is measured ────────────────────────────────────────────────────────
# Every crate's LOGIC: the engine (core), the orchestrator + tools (mcp), the
# contract (api), HTTP/WS (http), git, content, prompts, vcs, verify, the CLI,
# the web server, and the PURE-LOGIC modules of the shared UI crate (selection,
# flow, kinds, tokens, theme, view-models, graph layout) and of the desktop app
# (wire client, payload mapping). All of this is held to 100%.
#
# ── What is excluded, and why ───────────────────────────────────────────────
# Two categories, both "exercised only by running a binary / the GUI", exactly
# like a conventional `main.rs`:
#
# 1. Binary entry points & irreducible runtime I/O (unchanged):
#    - **/src/main.rs, **/bin/*.rs : binary entry points
#    - mcp/server.rs   : the blocking MCP stdio host + axum socket bind/serve
#    - mcp/desktop.rs  : spawns the external desktop GUI (LaunchServices `open`)
#    - http/listen.rs  : the CappedListener accept loop + AsyncRead/Write glue
#
# 2. Dioxus VIEW components — `#[component]` render functions whose uncovered
#    lines are `onclick`/`oninput`/`onpointer` event-handler closures and
#    `spawn(...)` / `use_future` async bodies. These execute ONLY inside a live
#    Wry webview driving real DOM events against a running engine — the same
#    class as the webview launch in `desktop/src/main.rs` (already excluded).
#    Their RENDER output is validated by dioxus_ssr smoke tests (the component
#    function still runs in those tests); their pure logic is extracted into the
#    measured modules above. The view files themselves are excluded:
#      - desktop/src/{review,home}.rs : the desktop review + home screens
#      - darkrun-ui components with interactive handlers (annotate, feedback,
#        session_views, view_artifacts, output_review, walkthrough, station_flow,
#        factory) + the SVG graph view
#      - web/site view + SSG page components (the marketing site render layer)
#
# Individual irreducible-I/O FUNCTIONS inside otherwise-measured files carry a
# `#[cfg(not(tarpaulin_include))]` annotation with a one-line reason (they
# compile normally; tarpaulin skips their lines). Current set: verify
# browser-capture, web-server `serve`, cli `login`/`verify_web_command`/
# `bench_command`/pr `create_for_run`, desktop wire `run_session_feed`.

[workspace]
workspace = true
engine = "llvm"
timeout = "1200s"
fail-under = 100
exclude-files = [
    "target/*",
    # ── binary entry points + irreducible runtime I/O ──
    "crates/darkrun-mcp/src/server.rs",
    "crates/darkrun-mcp/src/desktop.rs",
    "crates/darkrun-http/src/listen.rs",
    "**/src/main.rs",
    "**/src/bin/*.rs",
    "desktop/src/main.rs",
    # ── Dioxus view layer (GUI; SSR-smoke-tested, not line-covered) ──
    "desktop/src/review.rs",
    "desktop/src/home.rs",
    "crates/darkrun-ui/src/components/annotate.rs",
    "crates/darkrun-ui/src/components/feedback.rs",
    "crates/darkrun-ui/src/components/session_views.rs",
    "crates/darkrun-ui/src/components/view_artifacts.rs",
    "crates/darkrun-ui/src/components/output_review.rs",
    "crates/darkrun-ui/src/components/walkthrough.rs",
    "crates/darkrun-ui/src/components/station_flow.rs",
    "crates/darkrun-ui/src/components/factory.rs",
    "crates/darkrun-ui/src/graph/view.rs",
    # ── website render layer (Dioxus SSG pages + shell) ──
    "web/site/src/layout.rs",
    "web/site/src/ui.rs",
    "web/site/src/lib.rs",
    "web/site/src/theme_toggle.rs",
    "web/site/src/pages/*.rs",
]
