name: release

# Build per-arch native `darkrun` binaries and publish them to npm. Triggered by
# the GitHub Release that release-please publishes when its release PR is merged
# (NOT by raw tags). npm publish uses OIDC Trusted Publishing — no NPM_TOKEN
# (configure the trusted publisher on each package: repo darkrun-ai/darkrun,
# workflow release.yml).
#
# Distribution is npm-only: the `darkrun` package + per-arch `@darkrun/<os>-<arch>`
# sub-packages. GitHub Release tarballs are attached as raw downloads.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.2.0). Defaults to the Cargo.toml version."
        required: false

permissions:
  contents: write

jobs:
  version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      ref: ${{ steps.v.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.version }}" ]; then
            tag="v${{ inputs.version }}"
          else
            ver=$(sed -n '/\[workspace.package\]/,/^\[/p' Cargo.toml | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/')
            tag="v${ver}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "ref=${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            npm: darwin-arm64
            bin: darkrun
            desktop_bin: darkrun-desktop
          # Cross-compile the Intel binary on an Apple-Silicon runner: GitHub's
          # Intel macos-13 runners are scarce and the job can queue for ages;
          # macos-14 (arm) builds the x86_64 target fine via --target.
          - target: x86_64-apple-darwin
            os: macos-14
            npm: darwin-x64
            bin: darkrun
            desktop_bin: darkrun-desktop
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm: linux-x64
            bin: darkrun
            desktop_bin: darkrun-desktop
          # aarch64-linux: CLI only — cross-compiling the GUI desktop app is not
          # reliable, so it ships without the bundled desktop binary (the engine
          # falls back to DARKRUN_DESKTOP on that platform).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm: linux-arm64
            bin: darkrun
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm: win32-x64
            bin: darkrun.exe
            desktop_bin: darkrun-desktop.exe
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (linux-arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # The desktop app (Wry/Tao) links the system webview at build time.
      - name: Install desktop GUI deps (Linux)
        if: matrix.desktop_bin && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Build
        shell: bash
        # DARKRUN_SENTRY_DSN / DARKRUN_RELEASE are read via option_env! at compile
        # time and baked into the binaries (darkrun-telemetry). The DSN is a public
        # ingest key, not a secret — set as a repo secret only to keep it out of logs.
        env:
          DARKRUN_SENTRY_DSN: ${{ secrets.DARKRUN_CLI_SENTRY_DSN }}
          DARKRUN_RELEASE: ${{ needs.version.outputs.version }}
        run: |
          cargo build --release -p darkrun-cli --target ${{ matrix.target }}
          if [ -n "${{ matrix.desktop_bin }}" ]; then
            DARKRUN_SENTRY_DSN="${{ secrets.DARKRUN_DESKTOP_SENTRY_DSN }}" \
              cargo build --release -p darkrun-desktop --target ${{ matrix.target }}
          fi

      - name: Stage binaries for npm sub-package
        shell: bash
        run: |
          mkdir -p "npm/${{ matrix.npm }}/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "npm/${{ matrix.npm }}/bin/${{ matrix.bin }}"
          if [ -n "${{ matrix.desktop_bin }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.desktop_bin }}" \
               "npm/${{ matrix.npm }}/bin/${{ matrix.desktop_bin }}"
          fi

      - name: Package GitHub Release tarball
        shell: bash
        run: |
          mkdir -p dist
          files="${{ matrix.bin }}"
          [ -n "${{ matrix.desktop_bin }}" ] && files="$files ${{ matrix.desktop_bin }}"
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/darkrun-${{ matrix.target }}.tar.gz" $files

      - name: Upload binary artifact (for npm publish job)
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.npm }}
          # The whole bin/ dir, so darkrun-desktop rides along where it was built.
          path: npm/${{ matrix.npm }}/bin/

      - name: Upload release tarball
        uses: actions/upload-artifact@v7
        with:
          name: tarball-${{ matrix.target }}
          path: dist/*.tar.gz

  github-release:
    needs: [version, build]
    runs-on: ubuntu-latest
    # Best-effort: the repo uses IMMUTABLE releases, so assets can't be added once
    # release-please has published the release. npm is the real distribution
    # channel; the tarballs are a bonus. Don't fail the workflow if the attach is
    # rejected as immutable.
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: tarball-*
          path: dist
          merge-multiple: true
      # Attach the tarballs to the existing release (release-please already created it).
      - name: Attach tarballs to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.ref }}
          files: dist/*.tar.gz

  npm-publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    # OIDC Trusted Publishing — no NPM_TOKEN.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1; Node 20 ships an older npm.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # Re-assert the version everywhere from the tag — in particular the main
      # package's @darkrun/* optionalDependencies pins (release-please bumps the
      # .version fields but not these), so the published darkrun depends on the
      # matching arch packages.
      - name: Stamp version
        run: ./scripts/set-version.sh "${{ needs.version.outputs.version }}"

      - name: Download all per-arch binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          path: _bins

      - name: Place binaries into npm sub-packages
        shell: bash
        run: |
          for d in _bins/bin-*; do
            plat="${d#_bins/bin-}"
            mkdir -p "npm/${plat}/bin"
            cp "$d"/* "npm/${plat}/bin/"
            chmod +x "npm/${plat}/bin/"* || true
          done

      - name: Publish per-arch sub-packages
        shell: bash
        run: |
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            # `./` prefix is required: npm reads a bare `npm/darwin-arm64` as a
            # GitHub `owner/repo` shorthand and tries to git-clone it.
            npm publish "./npm/${plat}" --access public
          done

      - name: Publish main darkrun package (plugin)
        run: npm publish ./plugin --access public
