name: release

# Build per-arch native `darkrun` binaries and distribute them via npm:
#   - the `darkrun` package + per-arch `@darkrun/<os>-<arch>` sub-packages
#   - GitHub Release tarballs are attached as raw downloads (not a package manager)
#
# Distribution is npm-only. No Homebrew. No JavaScript is shipped — npm carries
# the native binary only.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            npm: darwin-arm64
            bin: darkrun
            desktop_bin: darkrun-desktop
          - target: x86_64-apple-darwin
            os: macos-13
            npm: darwin-x64
            bin: darkrun
            desktop_bin: darkrun-desktop
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm: linux-x64
            bin: darkrun
            desktop_bin: darkrun-desktop
          # aarch64-linux: CLI only — cross-compiling the GUI desktop app is not
          # reliable, so it ships without the bundled desktop binary (the engine
          # falls back to DARKRUN_DESKTOP on that platform).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm: linux-arm64
            bin: darkrun
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm: win32-x64
            bin: darkrun.exe
            desktop_bin: darkrun-desktop.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (linux-arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # The desktop app (Wry/Tao) links the system webview at build time.
      - name: Install desktop GUI deps (Linux)
        if: matrix.desktop_bin && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Build
        shell: bash
        # DARKRUN_SENTRY_DSN / DARKRUN_RELEASE are read via option_env! at compile
        # time and baked into the binaries (darkrun-telemetry). The DSN is a public
        # ingest key, not a secret — set as a repo secret only to keep it out of logs.
        env:
          DARKRUN_SENTRY_DSN: ${{ secrets.DARKRUN_CLI_SENTRY_DSN }}
          DARKRUN_RELEASE: ${{ github.ref_name }}
        run: |
          cargo build --release -p darkrun-cli --target ${{ matrix.target }}
          if [ -n "${{ matrix.desktop_bin }}" ]; then
            DARKRUN_SENTRY_DSN="${{ secrets.DARKRUN_DESKTOP_SENTRY_DSN }}" \
              cargo build --release -p darkrun-desktop --target ${{ matrix.target }}
          fi

      - name: Stage binaries for npm sub-package
        shell: bash
        run: |
          mkdir -p "npm/${{ matrix.npm }}/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "npm/${{ matrix.npm }}/bin/${{ matrix.bin }}"
          if [ -n "${{ matrix.desktop_bin }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.desktop_bin }}" \
               "npm/${{ matrix.npm }}/bin/${{ matrix.desktop_bin }}"
          fi

      - name: Package GitHub Release tarball
        shell: bash
        run: |
          mkdir -p dist
          files="${{ matrix.bin }}"
          [ -n "${{ matrix.desktop_bin }}" ] && files="$files ${{ matrix.desktop_bin }}"
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/darkrun-${{ matrix.target }}.tar.gz" $files

      - name: Upload binary artifact (for npm publish job)
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.npm }}
          # The whole bin/ dir, so darkrun-desktop rides along where it was built.
          path: npm/${{ matrix.npm }}/bin/

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: dist/*.tar.gz

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tarball-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz

  npm-publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all per-arch binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: _bins

      - name: Place binaries into npm sub-packages
        shell: bash
        run: |
          for d in _bins/bin-*; do
            plat="${d#_bins/bin-}"
            mkdir -p "npm/${plat}/bin"
            cp "$d"/* "npm/${plat}/bin/"
            chmod +x "npm/${plat}/bin/"* || true
          done

      - name: Publish per-arch sub-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            npm publish "npm/${plat}" --access public
          done

      - name: Publish main darkrun package (plugin)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish plugin --access public
