name: build-web-image

# Build the darkrun-web container (OAuth broker + static site) and push it to
# Artifact Registry. That's CI's ONLY job here — the `darkrun-infra` HCP Terraform
# workspace is VCS-driven, so Terraform plans/applies run on TFC when you push to
# this repo, not from CI. CI just supplies the image the Cloud Run service runs.
#
# Auth (GitHub Actions -> GCP) is Workload Identity Federation, no static key.
# Enable it by setting these repo secrets (see infra/bootstrap-gha.sh):
#   secrets.GCP_WORKLOAD_IDENTITY_PROVIDER
#   secrets.GCP_BUILD_SA
# Until those exist this workflow is manual-only (workflow_dispatch). Add the
# `push:` trigger below once the secrets are configured.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths: ["web/**", "crates/**", "Cargo.toml", "Cargo.lock", "Dockerfile"]

permissions:
  contents: read
  id-token: write # for Workload Identity Federation

env:
  GCP_PROJECT: darkrun
  GCP_REGION: us-central1
  REPO: darkrun
  IMAGE: darkrun-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_BUILD_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Compute image tag
        id: tag
        run: |
          sha="${GITHUB_SHA::12}"
          base="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${REPO}/${IMAGE}"
          echo "image=${base}:${sha}" >> "$GITHUB_OUTPUT"
          echo "latest=${base}:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        run: |
          docker build -t "${{ steps.tag.outputs.image }}" -t "${{ steps.tag.outputs.latest }}" .
          docker push "${{ steps.tag.outputs.image }}"
          docker push "${{ steps.tag.outputs.latest }}"
