name: ci

# Validation gate for PRs (and a re-check on main after merge). These are the
# checks branch protection should require before a PR can merge.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Reclaim disk before building. This job compiles the whole workspace TWICE
      # (release + debug test artifacts) over a heavy dep graph (dioxus + the full
      # `image`/AVIF codec set + native webview), which overruns the runner's ~14 GB
      # and fails with "No space left on device". Dropping the preinstalled .NET /
      # Android / GHC / CodeQL toolchains frees ~25 GB.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The desktop crate links the system webview — needed to compile the
      # whole workspace (clippy/test/build all touch it).
      - name: Install desktop GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      # Some darkrun-git tests build throwaway repos by shelling out to the `git`
      # CLI; a fresh runner has no identity, so `git commit` fails. Give it one.
      - name: Configure git identity (for fixture tests)
        run: |
          git config --global user.email "ci@darkrun.ai"
          git config --global user.name "darkrun ci"
          git config --global init.defaultBranch main

      # No `cargo fmt --check`: this codebase is intentionally hand-formatted
      # (no rustfmt.toml, never run through rustfmt), so default-rustfmt would
      # rewrite ~all of it. The hard gates are correctness — test + build.

      # Build + test are the blocking gates.
      - name: Build (release)
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace

      # Clippy runs as a report but does NOT block merges yet: the codebase has
      # never been linted under `-D warnings`, so cleaning it to zero is a
      # separate follow-up. Flip `continue-on-error` off once that's done.
      - name: Clippy (non-blocking)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings
