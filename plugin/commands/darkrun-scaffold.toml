description = "Scaffold custom darkrun artifacts — Factories, Stations, Workers, and Reviewers — as editable templates under .darkrun/"
prompt = """
Scaffold a custom darkrun artifact. Follow the `darkrun-scaffold` skill. Ask the user which kind and
name, then write the skeleton and wire it into its parent:

- Factory: `.darkrun/factories/{name}/FACTORY.md` + `stations/` dir (declares the Station sequence).
- Station: `.darkrun/factories/{factory}/stations/{name}/STATION.md` + `workers/` and `reviewers/`
  dirs; add to the parent Factory's station list in order.
- Worker: `.darkrun/factories/{factory}/stations/{station}/workers/{name}.md` with Focus, Produces,
  Reads, Anti-patterns; add to the parent Station's worker list.
- Reviewer: `.darkrun/factories/{factory}/stations/{station}/reviewers/{name}.md` describing what it
  inspects and the findings it emits at audit.

After scaffolding, suggest `/darkrun:darkrun-factories` to confirm the artifact registers.
"""
