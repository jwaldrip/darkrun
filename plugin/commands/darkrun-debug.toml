description = "Admin recovery for wedged Runs — preview the manager cursor, force a Station complete, set engine-managed fields, reset drift, or patch a feedback record. Every mutation requires user confirmation."
prompt = """
Run a darkrun admin recovery op. Follow the `darkrun-debug` skill. Every mutating op routes through
`darkrun_debug` and pauses for explicit user confirmation — never run one unilaterally.

`darkrun_debug` takes `run` + `op` + op args; always pass a `reason` on mutating ops:

- `preview_cursor` — read-only, no confirmation; run before and after any mutation.
- `force_station_complete { station, reason }` — stamp Checkpoint reviews/approvals for Units up to
  and including the target Station; refuses Units that haven't passed every Worker.
- `set_run_field { field, value, reason }` — bypass manager-protected fields (mainly mode).
- `reset_drift { reason }` — re-stamp every witness to the current SHA.
- `mutate_feedback { feedback_id, patch, reason }` — patch a feedback record directly.

Surface cancellation (`{ action: "cancelled" }`) verbatim and never auto-retry. After any op, call
`preview_cursor` to confirm the wedge cleared. For a full wipe instead, use `/darkrun:darkrun-reset`.
"""
