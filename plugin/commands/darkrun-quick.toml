description = "Quick single-Station Run — create a Run the manager auto-sizes to one Station, then advance it through that Station's phases"
prompt = """
Start a quick single-Station Run. Follow the `darkrun-quick` skill:

1. If the task is vague, ask ONE clarifying question via `AskUserQuestion`. Otherwise skip.
2. Call `darkrun_factory_list`, then `darkrun_run_start { title, description, slug, context,
   factory_candidates }`. Title is a crisp 3–8 word name, not a truncated description.
3. Right-sizing is automatic — for one-Station work the manager collapses the lifecycle. Don't pick a
   mode.
4. Advance with `darkrun_run_next { run: "<slug>" }` and loop until the Station's Checkpoint resolves.
5. If the work needs multiple Stations, suggest `/darkrun:darkrun-start`. If it's trivial and you want
   no state, suggest `/darkrun:darkrun-zap`.
"""
