description = "Submit feedback or a bug report about darkrun itself — synthesized into a structured, actionable report"
prompt = """
Submit a darkrun feedback/bug report. Follow the `darkrun-report` skill:

1. Ask the user what happened, what they expected, and any repro steps.
2. Synthesize it into a structured, actionable summary — never submit their words verbatim.
3. Show the summary and confirm before submitting.
4. Call `darkrun_report { message }` (optionally `contact_email`, `name`).

This is feedback about darkrun the tool. To route rework inside a Run, use `darkrun_feedback_create`
instead.
"""
