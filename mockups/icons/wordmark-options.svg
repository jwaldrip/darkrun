<svg width="980" height="640" viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="640" fill="#07090c"/>
  <style>
    .lbl{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:18px; fill:#5b6773; }
    .wm{ font-family:'Helvetica Neue',Arial,sans-serif; font-size:76px; letter-spacing:-2px; }
    .b{ font-weight:800; } .r{ font-weight:500; }
  </style>

  <!-- A: current website — outlined both -->
  <text x="60" y="70" class="lbl">A · outlined both (current website)</text>
  <text x="60" y="150" class="wm">
    <tspan class="b" fill="none" stroke="#5fd7ff" stroke-width="1.5">dark</tspan><tspan class="r" fill="none" stroke="#9aa7b4" stroke-width="1.5">run</tspan>
  </text>

  <!-- B: dark outlined cyan + run SOLID white -->
  <text x="60" y="240" class="lbl">B · dark outlined cyan · run solid white</text>
  <text x="60" y="320" class="wm">
    <tspan class="b" fill="none" stroke="#5fd7ff" stroke-width="1.5">dark</tspan><tspan class="r" fill="#e6edf3">run</tspan>
  </text>

  <!-- C: blue/white solid (dark cyan solid + run white solid) -->
  <text x="60" y="410" class="lbl">C · blue / white — solid (dark cyan · run white)</text>
  <text x="60" y="490" class="wm">
    <tspan class="b" fill="#5fd7ff">dark</tspan><tspan class="r" fill="#e6edf3">run</tspan>
  </text>

  <!-- D: dark cyan solid + run muted solid -->
  <text x="60" y="580" class="lbl">D · dark cyan solid · run muted-grey solid</text>
  <text x="60" y="640" class="wm" dy="-20">
    <tspan class="b" fill="#5fd7ff">dark</tspan><tspan class="r" fill="#9aa7b4">run</tspan>
  </text>
</svg>
