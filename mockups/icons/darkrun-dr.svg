<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11161d"/>
      <stop offset="1" stop-color="#06080b"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="224" fill="url(#bg)"/>
  <rect x="33.5" y="33.5" width="957" height="957" rx="222.5" fill="none" stroke="#2a333d" stroke-width="3"/>
  <!-- dr monogram: 'd' bold accent + 'r' regular text, mirroring the wordmark -->
  <text x="512" y="708" font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="600" text-anchor="middle" letter-spacing="-48">
    <tspan fill="#5fd7ff" font-weight="800">d</tspan><tspan fill="#e6edf3" font-weight="500">r</tspan>
  </text>
</svg>
